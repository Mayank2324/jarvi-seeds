<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jarvi Seeds Admin Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#f4f6f9;
padding:25px;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.buttons{
display:flex;
gap:10px;
align-items:center;
}

button{
padding:10px 18px;
border:none;
border-radius:5px;
cursor:pointer;
font-weight:bold;
color:white;
}

.download{
background:#2e7d32;
}

.logout{
background:#d32f2f;
}

.cards{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:18px;
margin-bottom:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
text-align:center;
}

.card h2{
font-size:18px;
color:#2e7d32;
margin-bottom:10px;
}

.card h1{
font-size:32px;
}

.searchBox{
margin-bottom:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.searchBox input{

width:350px;
padding:12px;
border:1px solid #ccc;
border-radius:5px;
font-size:16px;

}

table{

width:100%;
background:white;
border-collapse:collapse;
box-shadow:0 2px 8px rgba(0,0,0,.1);

}

th{

background:#2e7d32;
color:white;
padding:14px;

}

td{

padding:12px;
border:1px solid #ddd;
text-align:center;
vertical-align:top;

}

.seed-list{

text-align:left;
line-height:1.5;

}

.deleteBtn{

background:red;
padding:8px 14px;
border-radius:4px;

}

</style>

</head>

<body>

<div class="top">

<h1>🌱 Jarvi Seeds Admin Dashboard</h1>

<div class="buttons">

<input type="month" id="monthPicker">

<button class="download" onclick="downloadPDF()">
📄 PDF
</button>

<button class="download" onclick="downloadExcel()">
📊 Excel
</button>

<button class="logout" onclick="logout()">
Logout
</button>

</div>

</div>

<div class="cards">

<div class="card">
<h2>Total Orders</h2>
<h1 id="totalOrders">0</h1>
</div>

<div class="card">
<h2>Jarvi Red</h2>
<h1 id="redTotal">0</h1>
</div>

<div class="card">
<h2>Jarvi Red 1</h2>
<h1 id="red1Total">0</h1>
</div>

<div class="card">
<h2>Jarvi Red Plus</h2>
<h1 id="redPlusTotal">0</h1>
</div>

<div class="card">
<h2>White Honey</h2>
<h1 id="whiteTotal">0</h1>
</div>

</div>

<div class="searchBox">

<input
type="text"
id="searchInput"
placeholder="🔍 Search by Order ID, Farmer, Mobile or Village"
onkeyup="searchOrders()">

</div>

<table>

<thead>

<tr>

<th>Order ID</th>
<th>Customer</th>
<th>Mobile</th>
<th>Ordered Seeds</th>
<th>Village</th>
<th>Delivery</th>
<th>Action</th>

</tr>

</thead>

<tbody id="ordersTable">

</tbody>

</table>

<script src="js/dashboard.js"></script>

</body>

</html>
