<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Jarvi Seeds Admin</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{

font-family:Arial;

background:#f3f4f6;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

}

.login-box{

background:white;

padding:30px;

border-radius:10px;

box-shadow:0 0 10px rgba(0,0,0,.1);

width:350px;

}

input{

width:100%;

padding:12px;

margin-top:10px;

margin-bottom:15px;

}

button{

width:100%;

padding:12px;

background:green;

color:white;

border:none;

cursor:pointer;

}

#message{

margin-top:15px;

color:red;

}

</style>

</head>

<body>

<div class="login-box">

<h2>Jarvi Seeds Admin</h2>

<input
type="password"
id="adminKey"
placeholder="Enter Admin Password">

<button onclick="login()">

Login

</button>

<p id="message"></p>

</div>

<script src="js/admin.js"></script>

</body>

</html>
